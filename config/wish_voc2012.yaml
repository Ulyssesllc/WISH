# WISH on Pascal VOC 2012 (instance segmentation), Mask2Former R50 + SAM ViT-B.
# Inherits the vendor instance-seg base; WISH-specific keys live under MODEL.WISH.

_BASE_: ../vendor/Mask2Former/configs/coco/instance-segmentation/maskformer2_R50_bs16_50ep.yaml

MODEL:
  META_ARCHITECTURE: WISHMaskFormer
  WEIGHTS: hetero/vendor/Mask2Former/checkpoints/maskformer2_R50_coco_panoptic.pkl
  SEM_SEG_HEAD:
    NUM_CLASSES: 20  # VOC has 20 classes (COCO has 80)
  MASK_FORMER:
    TRANSFORMER_DECODER_NAME: WISHMultiScaleMaskedTransformerDecoder
  WISH:
    PROMPT_DIM: 256
    CLASS_WEIGHT: 2.0
    PROMPT_WEIGHT: 5.0
    SAM_MASK_WEIGHT: 5.0
    CAM_WEIGHT: 1.0
    SELF_WEIGHT: 1.0
    WARMUP_ITERS: 5000  # Shorter warmup for VOC (smaller dataset)
    SAM:
      TYPE: vit_b
      WEIGHTS: hetero/vendor/segment-anything/checkpoints/sam_vit_b_01ec64.pth

INPUT:
  WEAK_LABELS:
    MODE: hetero
    TAG_RATIO: 0.34
    POINT_RATIO: 0.33
    BOX_RATIO: 0.33
    SEED: 0

DATASETS:
  TRAIN: ("voc_2012_train_hetero",)   # registered by hetero.data.register_voc_hetero
  TEST: ("voc_2012_val",)

SOLVER:
  IMS_PER_BATCH: 4   # Smaller batch for VOC (smaller dataset)
  BASE_LR: 0.00005
  MAX_ITER: 40000    # VOC training: ~50 epochs
  CHECKPOINT_PERIOD: 5000

OUTPUT_DIR: outputs/hetero_voc2012
