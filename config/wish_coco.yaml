# WISH on COCO 2017 (instance segmentation), Mask2Former R50 + SAM ViT-B.
# Inherits the vendor instance-seg base; WISH-specific keys live under MODEL.WISH.
#
# NOTE: MODEL.WEIGHTS below is the panoptic R50 checkpoint that ships with the
# repo. The proper instance-seg checkpoint is not present; either download
# `maskformer2_R50_bs16_50ep.pkl` from the Mask2Former model zoo or accept
# init-from-panoptic (backbone matches; mask head will be re-trained anyway).
_BASE_: ../vendor/Mask2Former/configs/coco/instance-segmentation/maskformer2_R50_bs16_50ep.yaml

MODEL:
  META_ARCHITECTURE: WISHMaskFormer
  WEIGHTS: hetero/vendor/Mask2Former/checkpoints/maskformer2_R50_coco_panoptic.pkl
  MASK_FORMER:
    TRANSFORMER_DECODER_NAME: WISHMultiScaleMaskedTransformerDecoder
  WISH:
    PROMPT_DIM: 256
    CLASS_WEIGHT: 2.0
    PROMPT_WEIGHT: 5.0
    SAM_MASK_WEIGHT: 5.0
    CAM_WEIGHT: 1.0
    SELF_WEIGHT: 1.0
    WARMUP_ITERS: 30000
    SAM:
      TYPE: vit_b
      WEIGHTS: hetero/vendor/segment-anything/checkpoints/sam_vit_b_01ec64.pth

INPUT:
  WEAK_LABELS:
    MODE: hetero
    TAG_RATIO: 0.34
    POINT_RATIO: 0.33
    BOX_RATIO: 0.33
    SEED: 0

DATASETS:
  TRAIN: ("coco_2017_train_hetero",) # registered by hetero.data.register_hetero
  TEST: ("coco_2017_val",)

SOLVER:
  IMS_PER_BATCH: 2
  BASE_LR: 0.0000125
  MAX_ITER: 122917 # 1/3 of paper-spec 368750 (COCO 50ep @ bs16)
  CHECKPOINT_PERIOD: 10000

OUTPUT_DIR: outputs/hetero_v2